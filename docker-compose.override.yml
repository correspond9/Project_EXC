# =============================================================================
# docker-compose.override.yml — Local Development Overrides
# This file is auto-loaded by docker compose alongside docker-compose.yml.
# It exposes each service port on localhost for direct API testing/debugging.
# NEVER deploy this file to production.
# =============================================================================

services:

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  user-service:
    ports:
      - "8001:8000"
    volumes:
      - ./services/user-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  market-data-service:
