<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XChange Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
      max-width: 480px;
    }
    .badge {
      display: inline-block;
      background: #1f6feb;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p  { font-size: 15px; color: #8b949e; line-height: 1.6; }
    .sprint {
      margin-top: 28px;
      font-size: 13px;
      color: #3fb950;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Coming Soon</span>
    <h1>XChange Platform</h1>
    <p>The trading academy exchange platform is under active development.<br>
       The frontend will be built during Sprint 4 using Next.js + TradingView charts.</p>
    <div class="sprint">Sprint 1 — Foundation Complete</div>
  </div>
</body>
</html>
