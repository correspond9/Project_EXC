name: CI

on:
  push:
    branches:
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  # ============================================================
  # JOB 1: Lint all Python services with ruff
  # ============================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint all Python services
        run: |
          echo "Linting all services..."
          for service_dir in services/*/; do
            if [ -f "${service_dir}main.py" ] || [ -f "${service_dir}tasks.py" ]; then
              echo "  → $service_dir"
              ruff check "$service_dir" --ignore E501
            fi
          done
          echo "Lint complete."

  # ============================================================
  # JOB 2: Build all Docker images to verify Dockerfiles work
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend service images
        run: |
          services=(
            "user-service"
            "market-data-service"
            "order-service"
            "simulation-engine"
            "execution-service"
            "portfolio-service"
            "wallet-service"
            "risk-service"
            "notification-service"
            "admin-service"
            "worker"
          )
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build -t "xchange/${service}:ci" "./services/${service}"
          done

      - name: Build nginx image
        run: docker build -t xchange/nginx:ci ./infrastructure/nginx

      - name: Build frontend image
        run: docker build -t xchange/web-frontend:ci ./frontend/web

  # ============================================================
  # JOB 3: Run tests (pytest)
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xchange_test
          POSTGRES_PASSWORD: test_password_ci
          POSTGRES_DB: xchange_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install base test dependencies
        run: pip install pytest pytest-asyncio httpx fastapi

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://xchange_test:test_password_ci@localhost:5432/xchange_test_db
          DATABASE_SYNC_URL: postgresql://xchange_test:test_password_ci@localhost:5432/xchange_test_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_ALGORITHM: HS256
          ENVIRONMENT: test
          DEBUG: "false"
        run: |
          # Run tests if any test files exist; pass cleanly if none yet
          if find services/ -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest services/ -v --tb=short -q
          else
            echo "No test files found yet. CI passes. (Tests will be added per service in each sprint.)"
          fi
