# Monitoring Stack — Grafana + Prometheus
#
# Usage: docker compose -f docker-compose.yml -f infrastructure/monitoring/docker-compose.monitoring.yml up -d
#
# Ports (internal → host):
#   Prometheus  9090:9090
#   Grafana     3000:3000 (admin/admin — change on first login)
#
# Services are on the same "xchange_net" network as the main compose stack
# so they can scrape /metrics from each service directly by container name.

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: xchange-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - xchange_net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: xchange-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - xchange_net

volumes:
  prometheus_data:
  grafana_data:

networks:
  xchange_net:
    external: true
