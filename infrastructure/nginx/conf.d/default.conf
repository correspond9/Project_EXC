# Upstream service definitions
upstream user_service         { server user-service:8000;         }
upstream market_data_service  { server market-data-service:8000;  }
upstream order_service        { server order-service:8000;        }
upstream portfolio_service    { server portfolio-service:8000;    }
upstream wallet_service       { server wallet-service:8000;       }
upstream notification_service { server notification-service:8000; }
upstream admin_service        { server admin-service:8000;        }
upstream simulation_engine    { server simulation-engine:8000;    }
upstream web_frontend         { server web-frontend:3000;         }

server {
    listen 80;
    server_name _;

    # ------------------------------------------------------------------
    # Auth endpoints — strict rate limit (5 req/min per IP)
    # ------------------------------------------------------------------
    location = /api/auth/login {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://user_service;
        include /etc/nginx/proxy_params.conf;
    }

    location = /api/auth/register {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://user_service;
        include /etc/nginx/proxy_params.conf;
    }

    location = /api/auth/refresh {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://user_service;
        include /etc/nginx/proxy_params.conf;
    }

    # ------------------------------------------------------------------
    # API routes — standard rate limit
    # ------------------------------------------------------------------
    location /api/auth/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://user_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/users/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://user_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/market/ {
        limit_req zone=api_general burst=30 nodelay;
        proxy_pass http://market_data_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/orders/history {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://portfolio_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/orders/fills {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://portfolio_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/orders/margin {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://order_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/positions {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://portfolio_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/orders/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://order_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/portfolio/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://portfolio_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/wallet/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://wallet_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/notifications/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://notification_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/admin/ {
        limit_req zone=api_general burst=10 nodelay;
        proxy_pass http://admin_service;
        include /etc/nginx/proxy_params.conf;
    }

    # ------------------------------------------------------------------
    # WebSocket — market data (public, no auth)
    # ------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://market_data_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ------------------------------------------------------------------
    # WebSocket — user fill events (authenticated via token query param)
    # /ws/user/orders  → simulation-engine
    # /ws/user/portfolio → portfolio-service
    # Note: more-specific prefix locations must come BEFORE general /ws/user/
    # ------------------------------------------------------------------
    location /ws/user/portfolio {
        proxy_pass http://portfolio_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location /ws/user/ {
        proxy_pass http://simulation_engine;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ------------------------------------------------------------------
    # Frontend — all remaining requests
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://web_frontend;
        include /etc/nginx/proxy_params.conf;
    }
}
